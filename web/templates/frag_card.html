{{define "card"}}
<article class="card" data-photo-id="{{.Photo.ID}}">
  <img src="/photo/{{.Photo.ID}}" alt="" draggable="false">
  <div class="card-meta" hx-get="/meta/{{.Photo.ID}}" hx-trigger="load" hx-swap="innerHTML">
    <span class="path">{{.Photo.Path}}</span>
  </div>
  {{if eq (printf "%s" .Photo.State) "kept"}}<span class="badge keep">kept ×{{.Photo.KeepCount}}</span>{{end}}
  {{if eq (printf "%s" .Photo.State) "unsure"}}<span class="badge unsure">unsure ×{{.Photo.UnsureCount}}</span>{{end}}
</article>
{{end}}
