{{define "content"}}
<div id="photo-area" class="photo-area">
  {{if .ClusterID}}{{template "cluster" .}}{{else}}{{template "card" .}}{{end}}
</div>
<div class="actions">
  <button class="action trash" data-action="trash" type="button" aria-label="Trash (←)">
    <span class="glyph">✕</span><span class="label">Trash</span>
  </button>
  <button class="action skip" data-action="skip" type="button" aria-label="Skip (↑)">
    <span class="glyph">↷</span><span class="label">Skip</span>
  </button>
  <button class="action undo" data-action="undo" type="button" aria-label="Undo (Z)">
    <span class="glyph">⤺</span><span class="label">Undo</span>
  </button>
  <button class="action keep" data-action="keep" type="button" aria-label="Keep (→)">
    <span class="glyph">✓</span><span class="label">Keep</span>
  </button>
</div>
<p class="kbd-hint">← trash · ↑ skip · → keep · z undo · hold/click to zoom</p>
{{end}}
