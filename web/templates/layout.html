{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>photoSwipe</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"
          integrity="sha384-ESlCao+z/oasnu2Uc/5K1LQTI7YCF2KKO4xakCPQCFuiHhCh8Oa/R5NwHY6guZ3m"
          defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body class="{{.BodyClass}}">
  <header>
    <a class="brand" href="/">photoSwipe</a>
    {{if .Session}}
    <div class="progress" title="decisions this session">
      <span class="done">{{.Session.Done}}</span>{{if gt .Session.Target 0}}<span class="of"> / {{.Session.Target}}</span>{{end}}
    </div>
    {{end}}
    <nav>
      {{if .Session}}
      <form method="post" action="/session/end" class="inline-form">
        <button type="submit" class="link-btn" title="end this batch">finish sort</button>
      </form>
      {{end}}
      <a href="/settings" class="gear" title="settings" aria-label="settings">⚙</a>
      <a href="/logout" title="log out">logout</a>
    </nav>
  </header>
  <main>{{template "content" .}}</main>
  <div id="lightbox" hidden role="dialog" aria-modal="true" aria-label="zoomed photo">
    <img id="lightbox-img" alt="" draggable="false">
    <p class="lightbox-hint">tap to close · pinch or scroll to zoom</p>
  </div>
</body>
</html>{{end}}
